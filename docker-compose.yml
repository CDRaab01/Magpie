services:
  db:
    image: postgres:16
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Credentials default to magpie/magpie for local use; override via the root .env to
    # rotate. Must stay in sync with DATABASE_URL below (same variables).
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-magpie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-magpie}
      POSTGRES_DB: ${POSTGRES_DB:-magpie}
    # Host port 5436: reserved for Magpie in the suite's port allocation (8000-8004/5432-5435
    # belong to the sibling apps).
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magpie} -d ${POSTGRES_DB:-magpie}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ./server/.env
    environment:
      # Reach Postgres over the compose network; overrides DATABASE_URL from .env.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-magpie}:${POSTGRES_PASSWORD:-magpie}@db:5432/${POSTGRES_DB:-magpie}
      # Deploy stamp surfaced by GET /version. deploy/redeploy.* (Phase 8) will export these
      # before `compose up`; default to "unknown" for a plain manual `docker compose up`.
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILT_AT: ${BUILT_AT:-unknown}
    depends_on:
      db:
        condition: service_healthy
    # Published on localhost only. Magpie is DELIBERATELY tailnet-only — there is no
    # cloudflared service here (unlike the sibling apps). Reachability beyond this host is
    # via `tailscale serve` fronting this port with HTTPS at the node's MagicDNS name — see
    # deploy/README.md. Host port 8005: reserved for Magpie in the suite's port allocation.
    ports:
      - "127.0.0.1:8005:8000"

volumes:
  pgdata:
