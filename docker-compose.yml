services:
  db:
    image: postgres:16
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Credentials default to magpie/magpie for local use; override via the root .env to
    # rotate. Must stay in sync with DATABASE_URL below (same variables).
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-magpie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-magpie}
      POSTGRES_DB: ${POSTGRES_DB:-magpie}
    # Host port 5436: reserved for Magpie in the suite's port allocation (8000-8004/5432-5435
    # belong to the sibling apps).
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magpie} -d ${POSTGRES_DB:-magpie}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ./server/.env
    environment:
      # Reach Postgres over the compose network; overrides DATABASE_URL from .env.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-magpie}:${POSTGRES_PASSWORD:-magpie}@db:5432/${POSTGRES_DB:-magpie}
      # Deploy stamp surfaced by GET /version. deploy/redeploy.* (Phase 8) will export these
      # before `compose up`; default to "unknown" for a plain manual `docker compose up`.
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILT_AT: ${BUILT_AT:-unknown}
      # Suite SSO — public, non-secret values pinned here rather than only in server/.env:
      # Compose doesn't reload env_file content on `up`, so an env_file-only flag gets dropped
      # when a redeploy recreates the container without re-reading .env, silently 404ing
      # /auth/suite (a real regression that hit Spotter/Plate/Cookbook — see host OPERATIONS.md).
      SUITE_JWKS_URL: https://id.dragonflymedia.org/.well-known/jwks.json
      SUITE_ISSUER: https://id.dragonflymedia.org
      # Email ingestion (Phase 4 — main-account IMAP scoped to the "magpie-ingest" label; see
      # ARCHITECTURE.md "email ingestion"). Non-secret config comes by compose substitution from
      # the host's root .env, NOT committed here — this is a PUBLIC repo, so no personal email
      # address lands in git. IMAP_PASSWORD is the one secret, in server/.env. Empty IMAP_HOST ⇒
      # the poller never starts, so this stays inert until the host .env sets MAGPIE_IMAP_HOST/USER
      # and server/.env has the app password (set both together — a live host with no password
      # would just log auth failures, no outage).
      IMAP_HOST: ${MAGPIE_IMAP_HOST:-}
      IMAP_USER: ${MAGPIE_IMAP_USER:-}
      IMAP_LABEL: ${MAGPIE_IMAP_LABEL:-magpie-ingest}
    depends_on:
      db:
        condition: service_healthy
    # Published on localhost only. Magpie is DELIBERATELY tailnet-only — there is no
    # cloudflared service here (unlike the sibling apps). Reachability beyond this host is
    # via `tailscale serve` fronting this port with HTTPS at the node's MagicDNS name — see
    # deploy/README.md. Host port 8005: reserved for Magpie in the suite's port allocation.
    ports:
      - "127.0.0.1:8005:8000"

volumes:
  pgdata:
