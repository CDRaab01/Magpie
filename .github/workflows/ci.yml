name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Weekly bit-rot check (Mondays 08:00 UTC) so "green" stays meaningful between pushes.
    # Deploy is guarded against scheduled runs (Phase 8) so this never ships.
    - cron: "0 8 * * 1"

# The Android jobs check the repo out into Magpie/ and the sibling Pulse repo into Pulse/, so
# the composite build's includeBuild("../../Pulse") (relative to Magpie/android) resolves inside
# the workspace. Pulse is public, so the default token suffices.
#
# No android-screenshots job yet (deliberately): Phase 0 ships an empty placeholder screen with
# nothing worth baselining. Add that job in Phase 2 when the first real screens land, alongside
# the first recorded baselines — not before (a permanently-empty screenshot job was a known gap
# in an earlier suite app; don't repeat it here).

jobs:
  # ── Server ────────────────────────────────────────────────────────────────

  server-lint:
    name: "Server — Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.20
      - run: ruff check app
        working-directory: server
      - run: ruff format --check app
        working-directory: server

  server-test:
    name: "Server — Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: magpie
          POSTGRES_PASSWORD: magpie
          POSTGRES_DB: magpie_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://magpie:magpie@localhost:5432/magpie_test
      SECRET_KEY: ci-test-secret-key-not-for-production
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: pytest tests/ -v --tb=short

  # ── Android ───────────────────────────────────────────────────────────────

  android-test:
    name: "Android — Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Magpie/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Magpie
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :app:testDebugUnitTest --no-daemon

  android-build:
    name: "Android — Assemble Debug APK"
    runs-on: ubuntu-latest
    needs: android-test
    defaults:
      run:
        working-directory: Magpie/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Magpie
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: magpie-debug-${{ github.sha }}
          path: Magpie/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Security / supply chain ───────────────────────────────────────────────

  secret-scan:
    name: "Secret scan (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so a secret in any past commit is caught
      # --redact keeps the secret value out of the public log.
      - run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source /repo --redact --no-banner

  dep-audit:
    name: "Dependency audit (pip-audit)"
    runs-on: ubuntu-latest
    # Weekly-only + advisory: never blocks a push/PR or the deploy.
    if: github.event_name == 'schedule'
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip install -e .
      - run: pip-audit --desc
