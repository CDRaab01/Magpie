name: Deploy

# Redeploys the self-hosted Magpie server (Windows + Docker Desktop) on a self-hosted GitHub
# Actions runner. The runner long-polls GitHub *outbound*, so there are no inbound ports to open
# on the home network. Magpie has no cloudflared/tunnel profile (tailnet-only by design, CLAUDE.md
# §0/§8) — this workflow and redeploy.ps1 are a deliberate no-tunnel variant of the sibling apps'.
#
# Auto-deploy fires only after the CI workflow goes green on `main` (workflow_run), so a broken
# commit never ships. workflow_dispatch is a manual button that doubles as a rollback lever (pass
# a previous SHA in `ref`).
#
# Setup notes live in deploy/README.md.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or branch to deploy (default: origin/main). Use a prior SHA to roll back."
        required: false
        default: "origin/main"

# Never let two deploys run at once; queue the second instead of colliding.
concurrency:
  group: magpie-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Redeploy server
    # The `magpie` label is assigned when the runner is registered on the host.
    runs-on: [self-hosted, magpie]
    # Manual runs always proceed; automatic runs require a successful CI run on main that was
    # triggered by a push (NOT the weekly `schedule:` bit-rot run — that must never ship a deploy).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    steps:
      # No actions/checkout: we deploy the canonical clone on the host (vars.MAGPIE_DIR), not the
      # runner's ephemeral _work directory. That clone owns the .env file and the pgdata Docker
      # volume.
      - name: Redeploy
        shell: powershell
        env:
          MAGPIE_DIR: ${{ vars.MAGPIE_DIR }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:MAGPIE_DIR)) {
            throw "MAGPIE_DIR Actions variable is not set. See deploy/README.md."
          }
          if ($env:EVENT_NAME -eq 'workflow_dispatch') { $ref = $env:INPUT_REF }
          else { $ref = $env:WORKFLOW_SHA }
          if ([string]::IsNullOrWhiteSpace($ref)) { $ref = 'origin/main' }
          Write-Host "Deploying ref: $ref"
          & "$env:MAGPIE_DIR\deploy\redeploy.ps1" -Ref $ref

      # Post-deploy synthetic smoke: proves SSO + DB read/write actually work against the
      # just-deployed server, not just that /health is up. Magpie is SSO-only (CLAUDE.md §2) — no
      # register/login to script, so this mints a suite-audience token via dragonfly-id's
      # POST /smoke/token (a dedicated confidential smoke client, not the real magpie OAuth
      # client), trades it for a Magpie session via POST /auth/suite, creates a manual cash
      # transaction, reads it back, then deletes it. A non-zero exit fails the deploy run.
      - name: Post-deploy smoke
        shell: powershell
        env:
          MAGPIE_DIR: ${{ vars.MAGPIE_DIR }}
          SMOKE_CLIENT_ID: ${{ secrets.MAGPIE_SMOKE_CLIENT_ID }}
          SMOKE_CLIENT_SECRET: ${{ secrets.MAGPIE_SMOKE_CLIENT_SECRET }}
        run: |
          $ErrorActionPreference = "Stop"
          $proj = $env:MAGPIE_DIR
          if ([string]::IsNullOrWhiteSpace($env:SMOKE_CLIENT_ID) -or [string]::IsNullOrWhiteSpace($env:SMOKE_CLIENT_SECRET)) {
            Write-Warning "MAGPIE_SMOKE_CLIENT_ID/SECRET not configured - skipping post-deploy smoke (health check already passed)."
            exit 0
          }
          # Run the smoke INSIDE the server container (python is there; the runner has no host
          # python on PATH), hitting the app on its INTERNAL port 8000 -- 8005 is only the
          # host-published mapping (docker-compose.yml "127.0.0.1:8005:8000"), which doesn't
          # exist inside the container's own network namespace.
          docker compose -f "$proj\docker-compose.yml" cp "$proj\scripts\synthetic_smoke.py" server:/tmp/smoke.py
          if ($LASTEXITCODE -ne 0) { throw "copying smoke script into container failed" }
          docker compose -f "$proj\docker-compose.yml" exec -T `
            -e MAGPIE_URL=http://localhost:8000 `
            -e SMOKE_CLIENT_ID=$env:SMOKE_CLIENT_ID `
            -e SMOKE_CLIENT_SECRET=$env:SMOKE_CLIENT_SECRET `
            server python /tmp/smoke.py
          if ($LASTEXITCODE -ne 0) { throw "post-deploy smoke FAILED" }
